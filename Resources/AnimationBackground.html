<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Animation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', sans-serif;
}
#canvas-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
}
canvas {
    display: block;
    width: 100%; height: 100%;
}
/* Stats overlay */
#stats {
    position: fixed;
    bottom: 12px; right: 16px;
    color: rgba(74, 222, 128, 0.3);
    font-size: 11px;
    font-family: 'Consolas', monospace;
    z-index: 100;
    pointer-events: none;
    user-select: none;
}
</style>
</head>
<body>
<div id="canvas-container">
    <canvas id="auroraCanvas"></canvas>
</div>
<div id="stats">ANIMATION ENGINE v2.0</div>

<script>
(function() {
    'use strict';

    const canvas = document.getElementById('auroraCanvas');
    const ctx = canvas.getContext('2d', { alpha: true, willReadFrequently: false });

    let W, H;
    let mouseX = 0.5, mouseY = 0.5;
    let time = 0;
    let particles = [];
    let orbs = [];
    let auroraPoints = [];
    let stars = [];
    let frameId = null;

    // ============ CONFIG ============
    const CONFIG = {
        particleCount: 60,
        orbCount: 4,
        auroraBandCount: 3,
        starCount: 80,
        particleSpeed: 0.3,
        orbSpeed: 0.15,
        auroraSpeed: 0.08,
        performance: 'high' // 'high' | 'medium' | 'low'
    };

    // Auto-detect performance
    function detectPerformance() {
        // Check pixel ratio and screen size
        const dpr = window.devicePixelRatio || 1;
        const totalPixels = W * H * dpr;
        if (totalPixels > 4000000 || dpr > 2) {
            CONFIG.performance = 'medium';
            CONFIG.particleCount = 35;
            CONFIG.starCount = 40;
            CONFIG.orbCount = 2;
        } else if (totalPixels > 8000000) {
            CONFIG.performance = 'low';
            CONFIG.particleCount = 20;
            CONFIG.starCount = 25;
            CONFIG.orbCount = 1;
        } else {
            CONFIG.performance = 'high';
        }
    }

    // ============ RESIZE ============
    function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.scale(dpr, dpr);

        detectPerformance();
        initStars();
        initParticles();
        initOrbs();
        initAurora();
    }

    // ============ STARS (微光星星) ============
    function initStars() {
        stars = [];
        for (let i = 0; i < CONFIG.starCount; i++) {
            stars.push({
                x: Math.random() * W,
                y: Math.random() * H * 0.6,
                r: 0.3 + Math.random() * 0.8,
                a: 0.1 + Math.random() * 0.3,
                speed: 0.005 + Math.random() * 0.02,
                phase: Math.random() * Math.PI * 2
            });
        }
    }

    // ============ PARTICLES (浮动粒子) ============
    function initParticles() {
        particles = [];
        const colors = ['74,222,128', '45,212,191', '167,139,250', '96,165,250'];
        for (let i = 0; i < CONFIG.particleCount; i++) {
            particles.push({
                x: Math.random() * W,
                y: Math.random() * H,
                vx: (Math.random() - 0.5) * CONFIG.particleSpeed,
                vy: -0.1 - Math.random() * CONFIG.particleSpeed * 0.7,
                r: 1 + Math.random() * 3,
                color: colors[Math.floor(Math.random() * colors.length)],
                a: 0.05 + Math.random() * 0.2,
                phase: Math.random() * Math.PI * 2
            });
        }
    }

    // ============ ORBS (浮动光晕) ============
    function initOrbs() {
        orbs = [];
        const orbColors = [
            { r: 74, g: 222, b: 128 },
            { r: 45, g: 212, b: 191 },
            { r: 167, g: 139, b: 250 }
        ];
        for (let i = 0; i < CONFIG.orbCount; i++) {
            const color = orbColors[i % orbColors.length];
            orbs.push({
                x: Math.random() * W,
                y: 0.2 + Math.random() * 0.3 * H,
                vx: (Math.random() - 0.5) * CONFIG.orbSpeed,
                vy: (Math.random() - 0.5) * CONFIG.orbSpeed * 0.5,
                r: 80 + Math.random() * 150,
                color: color,
                a: 0.02 + Math.random() * 0.04,
                phase: Math.random() * Math.PI * 2
            });
        }
    }

    // ============ AURORA BANDS (极光带) ============
    function initAurora() {
        auroraPoints = [];
        for (let band = 0; band < CONFIG.auroraBandCount; band++) {
            const bandPoints = [];
            const segments = 40;
            for (let i = 0; i <= segments; i++) {
                bandPoints.push({
                    x: (i / segments) * W,
                    y: 0,
                    baseY: 0.1 + band * 0.08 + Math.random() * 0.05,
                    amp: 20 + Math.random() * 40,
                    freq: 0.02 + Math.random() * 0.03,
                    phase: Math.random() * Math.PI * 2,
                    speed: CONFIG.auroraSpeed * (0.5 + Math.random())
                });
            }
            const colors = [
                { r: 74, g: 222, b: 128, a1: 0.03, a2: 0.12 },
                { r: 45, g: 212, b: 191, a1: 0.02, a2: 0.08 },
                { r: 167, g: 139, b: 250, a1: 0.01, a2: 0.06 }
            ];
            const c = colors[band % colors.length];
            auroraPoints.push({
                points: bandPoints,
                color: c,
                band: band
            });
        }
    }

    // ============ DRAW AURORA ============
    function drawAurora() {
        for (const band of auroraPoints) {
            const pts = band.points;
            ctx.beginPath();
            ctx.moveTo(0, H);

            for (let i = 0; i < pts.length; i++) {
                const p = pts[i];
                const yOff = Math.sin(time * p.speed + p.phase + p.x * p.freq) * p.amp;
                const y = p.baseY * H * (1 + 0.3 * Math.sin(time * 0.1 + band.band)) + yOff;
                pts[i].y = y;

                if (i === 0) {
                    ctx.lineTo(p.x, y);
                } else {
                    const prev = pts[i - 1];
                    const cpx = (prev.x + p.x) / 2;
                    const cpy = (prev.y + y) / 2;
                    ctx.quadraticCurveTo(prev.x, prev.y, cpx, cpy);
                }
            }

            ctx.lineTo(W, H);
            ctx.closePath();

            const alpha = band.color.a1 + band.color.a2 * (0.5 + 0.5 * Math.sin(time * 0.05 + band.band));
            ctx.fillStyle = `rgba(${band.color.r},${band.color.g},${band.color.b},${alpha})`;
            ctx.fill();
        }
    }

    // ============ DRAW ORBS ============
    function drawOrbs() {
        for (const orb of orbs) {
            orb.x += orb.vx + (mouseX - 0.5) * 0.1;
            orb.y += orb.vy + (mouseY - 0.5) * 0.05;

            // Boundary wrap with padding
            if (orb.x < -orb.r) orb.x = W + orb.r;
            if (orb.x > W + orb.r) orb.x = -orb.r;
            if (orb.y < -orb.r) orb.y = H + orb.r;
            if (orb.y > H + orb.r) orb.y = -orb.r;

            const gradient = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.r);
            const alpha = orb.a * (0.7 + 0.3 * Math.sin(time * 0.3 + orb.phase));
            gradient.addColorStop(0, `rgba(${orb.color.r},${orb.color.g},${orb.color.b},${alpha * 0.3})`);
            gradient.addColorStop(0.4, `rgba(${orb.color.r},${orb.color.g},${orb.color.b},${alpha * 0.6})`);
            gradient.addColorStop(1, `rgba(${orb.color.r},${orb.color.g},${orb.color.b},0)`);

            ctx.fillStyle = gradient;
            ctx.fillRect(orb.x - orb.r, orb.y - orb.r, orb.r * 2, orb.r * 2);
        }
    }

    // ============ DRAW PARTICLES ============
    function drawParticles() {
        for (const p of particles) {
            p.x += p.vx + (mouseX - 0.5) * 0.05;
            p.y += p.vy;

            if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
            if (p.x < -10) p.x = W + 10;
            if (p.x > W + 10) p.x = -10;

            const alpha = p.a * (0.6 + 0.4 * Math.sin(time * 0.5 + p.phase));
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${p.color},${alpha})`;
            ctx.fill();

            // Glow
            if (p.r > 2.5) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${p.color},${alpha * 0.15})`;
                ctx.fill();
            }
        }
    }

    // ============ DRAW STARS ============
    function drawStars() {
        for (const s of stars) {
            const alpha = s.a * (0.5 + 0.5 * Math.sin(time * s.speed + s.phase));
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(240,244,241,${alpha})`;
            ctx.fill();
        }
    }

    // ============ MOUSE GLOW ============
    let mouseGlowX = -100, mouseGlowY = -100;
    let targetGlowX = -100, targetGlowY = -100;

    function drawMouseGlow() {
        mouseGlowX += (targetGlowX - mouseGlowX) * 0.05;
        mouseGlowY += (targetGlowY - mouseGlowY) * 0.05;

        if (mouseGlowX > 0 && mouseGlowY > 0) {
            const gradient = ctx.createRadialGradient(mouseGlowX, mouseGlowY, 0, mouseGlowX, mouseGlowY, 120);
            gradient.addColorStop(0, 'rgba(74,222,128,0.06)');
            gradient.addColorStop(0.5, 'rgba(74,222,128,0.02)');
            gradient.addColorStop(1, 'rgba(74,222,128,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(mouseGlowX - 120, mouseGlowY - 120, 240, 240);
        }
    }

    // ============ CONNECTION LINES ============
    function drawConnections() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 100) {
                    const alpha = (1 - dist / 100) * 0.06;
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(74,222,128,${alpha})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
    }

    // ============ MAIN LOOP ============
    function animate(timestamp) {
        time = timestamp * 0.001;

        // Clear with extremely subtle trail
        ctx.clearRect(0, 0, W, H);

        // Draw layers
        drawStars();
        drawAurora();
        drawOrbs();
        drawParticles();
        drawConnections();
        drawMouseGlow();

        // Performance adaptation
        if (CONFIG.performance === 'high') {
            // Extra effects on high-end
        }

        frameId = requestAnimationFrame(animate);
    }

    // ============ MOUSE ============
    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX / W;
        mouseY = e.clientY / H;
        targetGlowX = e.clientX;
        targetGlowY = e.clientY;
    });

    document.addEventListener('mouseleave', () => {
        targetGlowX = -100;
        targetGlowY = -100;
    });

    // ============ C# INTEROP ============
    // Methods callable from C#
    window.setParticleCount = function(count) {
        CONFIG.particleCount = Math.max(10, Math.min(200, count));
        initParticles();
    };

    window.setSpeed = function(speed) {
        CONFIG.particleSpeed = speed * 0.5;
        CONFIG.auroraSpeed = speed * 0.15;
        // Update existing particles
        for (const p of particles) {
            p.vx = (Math.random() - 0.5) * CONFIG.particleSpeed;
            p.vy = -0.1 - Math.random() * CONFIG.particleSpeed * 0.7;
        }
    };

    window.setOrbIntensity = function(intensity) {
        CONFIG.orbCount = Math.max(1, Math.min(8, Math.round(intensity * 4)));
        initOrbs();
    };

    // ============ START ============
    window.addEventListener('resize', resize);
    resize();
    animate(0);

    // Notify C# that animation is ready
    try {
        window.chrome.webview.postMessage({ type: 'ready' });
    } catch(e) {}

    console.log('[AuroraEngine] Initialized. Mode:', CONFIG.performance);
})();
</script>
</body>
</html>
